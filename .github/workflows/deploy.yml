name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Prepare static files
        run: |
          touch .output/public/.nojekyll
          find .output/public -name '.DS_Store' -delete

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .output/public
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        id: deployment-retry
        uses: actions/deploy-pages@v4

      - name: Verify deployment
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed after 2 attempts."
          echo "Re-run the full workflow (all jobs), not deploy only."
          exit 1
